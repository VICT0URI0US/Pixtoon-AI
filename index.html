<!DOCTYPE html>
<html>
<head>
  <title>Pixtoon AI</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #loginPage {
      max-width: 430px;
      margin: 90px auto;
      background: #120000;
      padding: 30px;
      border-radius: 22px;
      border: 1px solid #7f1d1d;
    }

    #loginPage h1 {
      text-align: center;
      color: #ef4444;
      font-size: 44px;
    }

    input, button {
      font-size: 16px;
      border-radius: 14px;
    }

    #loginPage input,
    #loginPage button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
    }

    input {
      background: #111;
      color: white;
      border: 1px solid #7f1d1d;
      outline: none;
    }

    button {
      background: #dc2626;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #0d0000;
      border-right: 1px solid #2a2a2a;
      padding: 14px;
      overflow-y: auto;
      transition: .25s;
    }

    .sidebar.hidden {
      margin-left: -260px;
    }

    .brand {
      color: #ef4444;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .newChat {
      width: 100%;
      padding: 13px;
      margin-bottom: 15px;
    }

    .chatItem {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin: 8px 0;
      background: #181818;
      border-radius: 12px;
      cursor: pointer;
    }

    .deleteChat {
      opacity: 0;
      background: transparent;
      color: #ff5555;
      font-size: 18px;
    }

    .chatItem:hover .deleteChat {
      opacity: 1;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, #111 0%, #050505 70%);
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid #222;
    }

    .menu {
      color: #ef4444;
      font-size: 28px;
      cursor: pointer;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .logout {
      margin-left: auto;
      padding: 9px 15px;
    }

    #chat {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 35px 18px 135px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 120px;
    }

    .msg {
      max-width: 68%;
      width: fit-content;
      padding: 14px 18px;
      border-radius: 22px;
      line-height: 1.45;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: fadeUp .2s ease;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ef4444, #991b1b);
      border-bottom-right-radius: 7px;
    }

    .bot {
      align-self: flex-start;
      background: #1c1c1c;
      border: 1px solid #2b2b2b;
      border-bottom-left-radius: 7px;
    }

    .bot b {
      display: block;
      margin-bottom: 7px;
      color: #ffb4b4;
    }

    .inputBox {
      position: fixed;
      bottom: 24px;
      left: calc(50% + 130px);
      transform: translateX(-50%);
      width: min(720px, 70vw);
      display: flex;
      align-items: center;
      gap: 10px;
      background: #151515;
      border: 1px solid #dc2626;
      border-radius: 999px;
      padding: 9px;
    }

    #message {
      flex: 1;
      height: 48px;
      background: transparent;
      border: none;
      padding: 0 16px;
    }

    #sendButton {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      padding: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div id="loginPage">
    <h1>Pixtoon AI</h1>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>
    <p id="status"></p>
  </div>

  <div id="app">
    <div id="sidebar" class="sidebar">
      <div class="brand">Pixtoon AI</div>
      <button class="newChat" onclick="createConversation()">+ New Chat</button>
      <div id="conversationList"></div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="menu" onclick="toggleSidebar()">☰</div>
        <div class="title">Pixxy</div>
        <button class="logout" onclick="logout()">Logout</button>
      </div>

      <div id="chat">
        <div class="empty">Create a new chat or choose one from the sidebar.</div>
      </div>

      <div class="inputBox">
        <input id="message" placeholder="Message Pixxy...">
        <button id="sendButton" onclick="handleSend()">➤</button>
      </div>
    </div>
  </div>

<script>
let currentConversationId = null;
let controller = null;
let generating = false;

async function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const res = await fetch("/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("status").textContent = data.message;
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("status").textContent = data.message;

  if (data.success) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "flex";
    await loadConversations();
  }
}

async function logout() {
  await fetch("/logout", { method: "POST", credentials: "include" });
  location.reload();
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hidden");
}

async function loadConversations() {
  const res = await fetch("/conversations", { credentials: "include" });
  const data = await res.json();
  const list = document.getElementById("conversationList");
  list.innerHTML = "";

  data.conversations.forEach(chat => {
    const div = document.createElement("div");
    div.className = "chatItem";

    const title = document.createElement("span");
    title.textContent = chat.title;

    const x = document.createElement("button");
    x.textContent = "×";
    x.className = "deleteChat";

    x.onclick = async (e) => {
      e.stopPropagation();
      await fetch(`/conversations/${chat.id}`, {
        method: "DELETE",
        credentials: "include"
      });

      if (currentConversationId === chat.id) {
        currentConversationId = null;
        document.getElementById("chat").innerHTML =
          `<div class="empty">Create a new chat or choose one from the sidebar.</div>`;
      }

      await loadConversations();
    };

    div.onclick = () => openConversation(chat.id);
    div.appendChild(title);
    div.appendChild(x);
    list.appendChild(div);
  });
}

async function createConversation() {
  const res = await fetch("/conversations", {
    method: "POST",
    credentials: "include"
  });

  const data = await res.json();
  currentConversationId = data.conversation.id;

  await loadConversations();
  await openConversation(currentConversationId);
}

async function openConversation(id) {
  currentConversationId = id;
  await loadConversations();

  const res = await fetch(`/conversations/${id}/messages`, {
    credentials: "include"
  });

  const data = await res.json();
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if (!data.messages || data.messages.length === 0) {
    chat.innerHTML = `<div class="empty">New chat started. Say hi to Pixxy.</div>`;
    return;
  }

  data.messages.forEach(msg => {
    const cls = msg.role === "user" ? "user" : "bot";
    const name = msg.role === "user" ? "" : "<b>Pixxy:</b>";
    chat.innerHTML += `<div class="msg ${cls}">${name}${escapeHtml(msg.content)}</div>`;
  });

  chat.scrollTop = chat.scrollHeight;
}

function handleSend() {
  if (generating && controller) {
    controller.abort();
    generating = false;
    controller = null;
    document.getElementById("sendButton").textContent = "➤";
    document.getElementById("thinking")?.remove();
    return;
  }

  send();
}

async function send() {
  const input = document.getElementById("message");
  const chat = document.getElementById("chat");
  const text = input.value.trim();

  if (!text) return;

  if (!currentConversationId) {
    await createConversation();
  }

  chat.querySelector(".empty")?.remove();
  chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
  input.value = "";

  chat.innerHTML += `<div class="msg bot" id="thinking"><b>Pixxy:</b>Thinking...</div>`;
  chat.scrollTop = chat.scrollHeight;

  controller = new AbortController();
  generating = true;

  const sendBtn = document.getElementById("sendButton");
  sendBtn.textContent = "■";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      signal: controller.signal,
      body: JSON.stringify({
        message: text,
        conversationId: currentConversationId
      })
    });

    const data = await res.json();
    document.getElementById("thinking")?.remove();

    const botDiv = document.createElement("div");
    botDiv.className = "msg bot";
    botDiv.innerHTML = "<b>Pixxy:</b>";
    chat.appendChild(botDiv);

    for (const word of data.reply.split(" ")) {
      botDiv.innerHTML += escapeHtml(word) + " ";
      chat.scrollTop = chat.scrollHeight;
      await new Promise(r => setTimeout(r, 20));
    }

    await loadConversations();
  } catch (err) {
    document.getElementById("thinking")?.remove();
    if (err.name !== "AbortError") {
      chat.innerHTML += `<div class="msg bot"><b>Pixxy:</b>Something went wrong.</div>`;
    }
  }

  generating = false;
  controller = null;
  sendBtn.textContent = "➤";
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("message").addEventListener("keydown", e => {
    if (e.key === "Enter") handleSend();
  });
});
</script>
</body>
</html>
